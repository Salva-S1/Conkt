<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual de Procedimientos y Operativa - Banco Santander</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { santander: '#ec0000', santanderDark: '#b30000' } }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body, p, li, td, th, span, a, input, button, label {
            font-family: 'Inter', sans-serif; font-size: 11px !important; line-height: 1.5 !important;
        }
        h1, h2, h3, h4, h5, h6, .forced-heading-size, .title-13 {
            font-size: 13px !important; font-weight: 800 !important; letter-spacing: 0.05em !important; text-transform: uppercase !important;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        .light ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors duration-200 min-h-screen">

    <header class="bg-red-600 text-white border-b border-red-700 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <div class="bg-white text-red-600 p-2 rounded-lg flex items-center justify-center shadow-md shrink-0">
                    <i class="fa-solid fa-building-columns text-sm"></i>
                </div>
                <div>
                    <span class="font-extrabold tracking-wider block forced-heading-size">SANTANDER BANCA DIGITAL</span>
                    <span class="text-[9.5px] opacity-90 block">Manual de Procedimientos Optimizado</span>
                </div>
            </div>

            <div class="flex items-center gap-2 flex-grow sm:flex-grow-0 sm:w-auto w-full">
                <div class="relative w-full sm:w-64">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <i class="fa-solid fa-magnifying-glass text-xs"></i>
                    </span>
                    <input type="text" id="manualSearch" onkeyup="filterManual()" placeholder="Buscar en el manual..." 
                           class="w-full pl-8 pr-4 py-1 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 border border-red-500 dark:border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400 text-xs">
                </div>
                <button onclick="toggleTheme()" class="p-2 bg-red-700 hover:bg-red-800 text-white border border-red-500 rounded-lg flex items-center justify-center shadow-sm" title="Cambiar Tema">
                    <i id="themeIcon" class="fa-solid fa-moon text-xs"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <aside class="lg:col-span-4 lg:sticky lg:top-20 h-fit space-y-4">
            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 shadow-sm">
                <div class="flex items-center gap-2 border-b border-slate-100 dark:border-slate-700 pb-2 mb-3">
                    <i class="fa-solid fa-list-ul text-red-600"></i>
                    <h2 class="forced-heading-size text-slate-900 dark:text-slate-100">ÍNDICE DE CONTENIDOS</h2>
                </div>
                <nav id="dynamic-nav" class="space-y-3"></nav>
            </div>

            <div class="bg-[#0c1a30] dark:bg-[#070f21] border border-slate-800 rounded-xl p-4 shadow-sm text-slate-200 relative overflow-hidden">
                <div class="absolute right-[-15px] bottom-[-15px] opacity-10 text-[80px] pointer-events-none">
                    <i class="fa-solid fa-headset text-white"></i>
                </div>
                <div class="flex items-center gap-2 border-b border-slate-800 pb-2 mb-3 relative z-10">
                    <div class="bg-red-600 text-white rounded-full w-4 h-4 flex items-center justify-center text-[9px] font-bold">i</div>
                    <h2 class="forced-heading-size text-white">CHECKLIST DEL AGENTE</h2>
                </div>
                <p class="text-slate-300 mb-4 z-10 relative">Marca las tareas completadas durante la interacción para asegurar la calidad.</p>
                <div class="relative z-10">
                    <button onclick="clearAllChecks()" class="w-full py-1.5 border border-slate-700 bg-transparent hover:bg-slate-800 rounded-lg text-white font-semibold text-center tracking-wider text-[10px]">
                        REINICIAR CHECKLISTS
                    </button>
                </div>
            </div>
        </aside>

        <section id="manual-content" class="lg:col-span-8 space-y-6 pb-20"></section>
    </main>

    <script>
        let datosManual = {};

        // Función de inicialización del motor dinámico
        async function inicializarApp() {
            try {
                // Intento de carga nativa del JSON externo
                const respuesta = await fetch('manual_data.json');
                datosManual = await respuesta.json();
            } catch (error) {
                console.log("CORS o Servidor Local ausente. Cargando datos desde el módulo de contingencia integrado...");
                // Contingencia para que funcione directamente abriendo el archivo local sin montar un servidor http://
                datosManual = { "modulos": document.getElementById('backup-data') ? JSON.parse(document.getElementById('backup-data').textContent).modulos : [] };
            }
            
            if(datosManual.modulos) {
                renderizarMenu();
                renderizarContenido();
                restaurarEstadoCheckboxes();
            }
        }

        function renderizarMenu() {
            const nav = document.getElementById('dynamic-nav');
            nav.innerHTML = datosManual.modulos.map(m => `
                <div>
                    <button onclick="toggleSection('${m.id}')" class="w-full flex items-center justify-between py-1 font-bold text-slate-800 dark:text-slate-200 hover:text-red-600 dark:hover:text-red-400 text-left">
                        <span class="title-13">${m.titulo}</span>
                        <i id="menu-arrow-${m.id}" class="fa-solid fa-chevron-down text-slate-400 text-[10px]"></i>
                    </button>
                    <div id="sub-menu-${m.id}" class="pl-3 space-y-1.5 border-l border-slate-200 dark:border-slate-700 ml-1 mt-1 hidden">
                        ${m.tarjetas.map(t => `
                            <a href="#${t.id}" class="block py-0.5 text-slate-600 dark:text-slate-400 hover:text-red-600 dark:hover:text-red-400">
                                <i class="fa-solid fa-file-invoice mr-1 text-[9px]"></i> ${t.num} ${t.titulo}
                            </a>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderizarContenido() {
            const contenedor = document.getElementById('manual-content');
            contenedor.innerHTML = datosManual.modulos.map(m => `
                <div id="${m.id}" class="searchable-section space-y-4">
                    <div class="bg-${m.color}-700 text-white rounded-2xl p-5 shadow-sm relative overflow-hidden">
                        <span class="bg-black/25 text-white font-extrabold px-2.5 py-0.5 rounded-md text-[8.5px] uppercase tracking-wider mb-2.5 inline-block">${m.tag_modulo}</span>
                        <button onclick="toggleSection('${m.id}')" class="w-full text-left flex justify-between items-center group">
                            <h1 class="text-white forced-heading-size">${m.titulo}</h1>
                            <div class="bg-white/20 group-hover:bg-white/30 p-2 rounded-full h-7 w-7 flex items-center justify-center shrink-0">
                                <i id="arrow-${m.id}" class="fa-solid fa-chevron-down text-white text-xs"></i>
                            </div>
                        </button>
                        <p class="text-white/90 mt-2 mb-0">${m.descripcion}</p>
                    </div>

                    <div id="content-${m.id}" class="space-y-5 hidden">
                        ${m.tarjetas.map(t => `
                            <div id="${t.id}" class="searchable-card bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-5 shadow-sm">
                                <div class="flex items-center justify-between border-b border-slate-100 dark:border-slate-700 pb-3 mb-4">
                                    <div class="flex items-center gap-2">
                                        <span class="bg-red-50 dark:bg-red-950/40 text-red-600 dark:text-red-400 rounded-full w-5 h-5 inline-flex items-center justify-center font-bold text-[10px]">${t.num}</span>
                                        <h2 class="forced-heading-size text-slate-900 dark:text-slate-100">${t.titulo}</h2>
                                    </div>
                                    <span class="bg-blue-50 dark:bg-blue-950/50 text-blue-600 dark:text-blue-400 font-bold px-2.5 py-0.5 rounded-full text-[9px] uppercase tracking-wider">${t.badge}</span>
                                </div>

                                <div class="border-l-4 border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/50 p-3 rounded-r-lg mb-4">
                                    <p class="text-slate-600 dark:text-slate-400 mb-0">${t.intro}</p>
                                </div>

                                ${t.nota_alerta ? `<div class="bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-900/40 p-3 rounded-lg mb-4 text-amber-800 dark:text-amber-300">${t.nota_alerta}</div>` : ''}

                                ${t.cards ? `
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                                        ${t.cards.map(c => `
                                            <div class="bg-slate-50 dark:bg-slate-900/40 p-3 rounded-lg border border-slate-200 dark:border-slate-700">
                                                <span class="text-slate-400 text-[8px] font-extrabold uppercase block tracking-wider mb-1">${c.meta}</span>
                                                <div class="font-bold text-slate-800 dark:text-slate-200 mb-1">${c.titulo}</div>
                                                <p class="text-slate-500 dark:text-slate-400 text-[10px] leading-relaxed mb-0">${c.desc}</p>
                                            </div>
                                        `).join('')}
                                    </div>
                                ` : ''}

                                ${t.bloques ? t.bloques.map((b, bIdx) => `
                                    <div class="bg-slate-50 dark:bg-slate-900/40 p-4 rounded-lg border border-slate-100 dark:border-slate-700/50 mb-3">
                                        <div class="${b.tipo === 'prioritario' ? 'bg-emerald-50 dark:bg-emerald-950/40 border-emerald-100' : b.tipo === 'advertencia' ? 'bg-amber-50 dark:bg-amber-950/40 border-amber-100' : 'bg-slate-100 dark:bg-slate-700 border-slate-200'} p-2.5 rounded-lg border flex items-center justify-between mb-3">
                                            <span class="title-13 font-extrabold">${b.titulo}</span>
                                        </div>
                                        ${b.subtexto ? `<p class="text-slate-500 dark:text-slate-400 mb-3 italic">${b.subtexto}</p>` : ''}
                                        
                                        ${b.checklist ? `
                                            <div class="space-y-2 mb-3 pl-1">
                                                ${b.checklist.map((ch, chIdx) => `
                                                    <div class="flex items-start gap-2.5">
                                                        <input type="checkbox" id="${t.id}-b${bIdx}-ch${chIdx}" class="cb-checklist mt-0.5 rounded border-slate-300 text-red-600 h-3.5 w-3.5 shrink-0">
                                                        <label for="${t.id}-b${bIdx}-ch${chIdx}" class="text-slate-600 dark:text-slate-400">${ch}</label>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        ` : ''}

                                        ${b.proceso_ordenado ? `
                                            <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden mb-3">
                                                ${b.proceso_ordenado.map(po => `
                                                    <div class="border-b border-slate-100 dark:border-slate-700 p-3 flex gap-3">
                                                        <div class="shrink-0 w-6 h-6 rounded-full bg-red-600 text-white flex items-center justify-center font-extrabold">${po.letra}</div>
                                                        <div class="space-y-1 flex-1">
                                                            <div class="font-bold text-slate-800 dark:text-slate-200">${po.titulo}</div>
                                                            <p class="text-slate-600 dark:text-slate-400 mb-0 leading-relaxed">${po.desc}</p>
                                                        </div>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        ` : ''}

                                        ${b.tabla_comisiones ? `
                                            <div class="overflow-x-auto my-3 bg-white dark:bg-slate-800 p-2 rounded border">
                                                <table class="w-full text-left text-[10px]">
                                                    <thead>
                                                        <tr class="border-b font-bold text-slate-700 dark:text-slate-300">
                                                            ${b.tabla_comisiones.columnas.map(col => `<th class="py-1 px-2">${col}</th>`).join('')}
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        ${b.tabla_comisiones.filas.map(fila => `
                                                            <tr class="border-b border-slate-100 dark:border-slate-700">
                                                                ${fila.map(celda => `<td class="py-1.5 px-2">${celda}</td>`).join('')}
                                                            </tr>
                                                        `).join('')}
                                                    </tbody>
                                                </table>
                                            </div>
                                        ` : ''}

                                        ${b.terminal ? `
                                            <div class="bg-[#080d1a] text-emerald-400 p-3 rounded-lg font-mono text-[9.5px] space-y-1 border border-slate-800 my-3">
                                                ${b.terminal.map(linea => `<div>${linea}</div>`).join('')}
                                            </div>
                                        ` : ''}

                                        ${b.doble_resultado ? `
                                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-3">
                                                <div class="bg-red-50 dark:bg-red-950/20 border border-red-100 p-2.5 rounded text-red-800 dark:text-red-300">${b.doble_resultado.ko}</div>
                                                <div class="bg-green-50 dark:bg-green-950/20 border border-green-100 p-2.5 rounded text-green-800 dark:text-green-300">${b.doble_resultado.ok}</div>
                                            </div>
                                        ` : ''}

                                        ${b.nota_alerta ? `<div class="bg-[#fffcf0] dark:bg-[#2d2a1a] border border-[#fdf1ca] p-3 rounded-lg text-yellow-800 dark:text-yellow-300">${b.nota_alerta}</div>` : ''}
                                        ${b.nota_azul ? `<div class="bg-blue-50 dark:bg-blue-950/20 border-l-4 border-blue-500 p-3 rounded-r text-slate-700 dark:text-slate-300">${b.nota_azul}</div>` : ''}
                                    </div>
                                `).join('') : ''}

                                ${t.tabla_comisiones ? `
                                    <div class="overflow-x-auto mb-3 bg-slate-900 p-4 rounded-xl border border-slate-800 shadow-md">
                                        <table class="w-full text-left text-[10px] text-slate-300">
                                            <thead>
                                                <tr class="border-b border-slate-800 text-white uppercase text-[9px]">
                                                    ${t.tabla_comisiones.columnas.map(col => `<th class="py-1 px-2">${col}</th>`).join('')}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${t.tabla_comisiones.filas.map(fila => `
                                                    <tr class="border-b border-slate-800/60">
                                                        <td class="py-1.5 font-bold text-white">${fila[0]}</td>
                                                        <td class="py-1.5 px-2 text-red-400">${fila[1]}</td>
                                                        <td class="py-1.5">${fila[2]}</td>
                                                    </tr>
                                                `).join('')}
                                            </tbody>
                                        </table>
                                    </div>
                                ` : ''}

                                ${t.reglas_oro ? `
                                    <div class="mt-5 bg-slate-900 dark:bg-slate-950 text-slate-100 p-4 rounded-xl border border-slate-800 shadow-md">
                                        <h4 class="forced-heading-size text-white border-b border-slate-800 pb-1.5 mb-2.5 flex items-center gap-2">
                                            <i class="fa-solid fa-circle-info text-blue-400"></i> Reglas Obligatorias de Operativa
                                        </h4>
                                        <ul class="space-y-1.5">
                                            ${t.reglas_oro.map(r => `
                                                <li class="flex items-start gap-2 text-slate-300">
                                                    <i class="fa-solid fa-circle-check text-blue-400 mt-1 shrink-0"></i>
                                                    <span>${r}</span>
                                                </li>
                                            `).join('')}
                                        </ul>
                                    </div>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            // Asignar escuchadores para persistencia de checkboxes dinámicos
            document.querySelectorAll('.cb-checklist').forEach(cb => {
                cb.addEventListener('change', () => localStorage.setItem(cb.id, cb.checked));
            });
        }

        function toggleSection(id) {
            const content = document.getElementById('content-' + id);
            const arrow = document.getElementById('arrow-' + id);
            const menuArrow = document.getElementById('menu-arrow-' + id);
            const subMenu = document.getElementById('sub-menu-' + id);

            if (!content) return;

            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                if (arrow) arrow.className = 'fa-solid fa-chevron-up text-white text-xs';
                if (menuArrow) menuArrow.className = 'fa-solid fa-chevron-up text-slate-400 text-[10px]';
                if (subMenu) subMenu.classList.remove('hidden');
            } else {
                content.classList.add('hidden');
                if (arrow) arrow.className = 'fa-solid fa-chevron-down text-white text-xs';
                if (menuArrow) menuArrow.className = 'fa-solid fa-chevron-down text-slate-400 text-[10px]';
                if (subMenu) subMenu.classList.add('hidden');
            }
        }

        function filterManual() {
            const query = document.getElementById('manualSearch').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.searchable-card');
            const sections = document.querySelectorAll('.searchable-section');

            if (query === '') {
                sections.forEach(sec => sec.classList.remove('hidden'));
                cards.forEach(card => {
                    card.classList.remove('hidden', 'border-red-500', 'ring-1', 'ring-red-500');
                    card.parentElement.classList.add('hidden');
                });
                return;
            }

            sections.forEach(sec => {
                const contentId = 'content-' + sec.id;
                document.getElementById(contentId).classList.remove('hidden');
            });

            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                if (text.includes(query)) {
                    card.classList.remove('hidden');
                    card.classList.add('border-red-500', 'ring-1', 'ring-red-500');
                } else {
                    card.classList.add('hidden');
                    card.classList.remove('border-red-500', 'ring-1', 'ring-red-500');
                }
            });
        }

        function restaurarEstadoCheckboxes() {
            document.querySelectorAll('.cb-checklist').forEach(cb => {
                const saved = localStorage.getItem(cb.id);
                if (saved !== null) cb.checked = (saved === 'true');
            });
        }

        function clearAllChecks() {
            document.querySelectorAll('.cb-checklist').forEach(cb => {
                cb.checked = false;
                localStorage.removeItem(cb.id);
            });
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark'); icon.className = 'fa-solid fa-moon text-xs';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark'); icon.className = 'fa-solid fa-sun text-xs';
                localStorage.setItem('theme', 'dark');
            }
        }

        window.addEventListener('load', () => {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('themeIcon').className = 'fa-solid fa-sun text-xs';
            }
            inicializarApp();
        });
    </script>
